<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>{{TITLE}} &mdash; RakuAI Blog</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="author" content="{{AUTHOR}}">
    <link rel="canonical" href="{{CANONICAL}}">
    <link rel="alternate" type="application/rss+xml" title="RakuAI Blog" href="/blog/feed.xml">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:url" content="{{CANONICAL}}">
    <meta property="og:image" content="{{OG_IMAGE}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="RakuAI">
    <meta property="article:published_time" content="{{DATE_ISO}}">
    <meta property="article:author" content="{{AUTHOR}}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="{{OG_IMAGE}}">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/blog/blog.css">
    <link rel="stylesheet" href="/blog/syntax.css">
</head>
<body>

<nav>
    <div class="container">
        <a href="/index.html" class="logo">RAKUAI<sup class="tm">&trade;</sup></a>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/engine/">Engine</a>
            <a href="/api/">API Docs</a>
            <a href="/games/">Games</a>
            <a href="/why-rakuai.html">Why RakuAI</a>
            <a href="/developers/">Developers</a>
            <a href="/press.html">Press</a>
            <a href="/blog/" aria-current="page">Blog</a>
            <a href="/ja/index.html" class="lang-toggle">楽AI<sup class="tm">&trade;</sup></a>
        </div>
    </div>
</nav>

<main class="blog-main">
    <article class="post">
        <header class="post-header">
            {{BREADCRUMB}}
            <h1>{{TITLE}}</h1>
            <p class="post-meta">
                <time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time>
                <span class="post-meta-sep">&middot;</span>
                <span class="post-author">{{AUTHOR}}</span>
            </p>
        </header>
        <div class="post-body">
{{BODY}}
        </div>
        {{TAGS}}
        {{SERIES_NAV}}
    </article>
    <p class="post-back"><a href="/blog/">&larr; All posts</a></p>
</main>

<footer class="blog-footer">
    <div class="container">
        <p>&copy; 2026 RakuAI, LLC. <a href="/blog/feed.xml">RSS</a> &middot; <a href="/index.html">rakuai.com</a></p>
    </div>
</footer>

</body>
</html>

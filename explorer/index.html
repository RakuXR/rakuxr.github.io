<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RakuXR API Explorer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* Config bar */
  #config{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#111125;border-bottom:1px solid #222}
  #config label{font-size:12px;color:#888}
  #config input{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:4px 8px;border-radius:4px;font-size:13px}
  #config input#baseUrl{width:280px}
  #config input#apiKey{width:180px}
  .cfg-btn{background:#6c5ce7;color:#fff;border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
  .cfg-btn:hover{background:#7d6ff0}
  .cfg-btn.quick{background:#00b894}
  .cfg-btn.quick:hover{background:#00d2a4}
  #connStatus{font-size:11px;padding:3px 8px;border-radius:10px;background:#333;margin-left:4px}

  /* Main 3-column layout */
  #main{display:flex;flex:1;overflow:hidden}

  /* Left panel */
  #sidebar{width:250px;min-width:250px;background:#0e0e20;border-right:1px solid #222;overflow-y:auto;padding:10px}
  .group-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#6c5ce7;margin:14px 0 6px;font-weight:700}
  .group-label:first-child{margin-top:4px}
  .ep-btn{display:flex;align-items:center;gap:8px;width:100%;background:#151530;border:1px solid #222;color:#ccc;padding:7px 10px;border-radius:5px;cursor:pointer;font-size:12px;margin-bottom:4px;text-align:left;transition:border-color .15s}
  .ep-btn:hover{border-color:#6c5ce7}
  .ep-btn.active{border-color:#6c5ce7;background:#1a1a3a}
  .method-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;min-width:38px;text-align:center}
  .method-tag.GET{background:#00b89433;color:#00b894}
  .method-tag.POST{background:#6c5ce733;color:#a29bfe}
  .method-tag.PUT{background:#fdcb6e33;color:#fdcb6e}
  .method-tag.DELETE{background:#ff767633;color:#ff7676}
  .ep-path{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

  /* Center panel */
  #center{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px}
  #ep-header{margin-bottom:12px}
  #ep-header h2{font-size:16px;display:flex;align-items:center;gap:10px}
  #ep-header .method-tag{font-size:13px;padding:3px 10px}
  #ep-path-display{font-family:'Fira Code',monospace;font-size:14px;color:#a29bfe}
  #body-section{margin-bottom:12px}
  #body-section label{font-size:11px;color:#888;display:block;margin-bottom:4px}
  #reqBody{width:100%;height:140px;background:#111125;border:1px solid #333;color:#e0e0e0;font-family:'Fira Code',monospace;font-size:13px;padding:10px;border-radius:6px;resize:vertical}
  #sendBtn{background:#6c5ce7;color:#fff;border:none;padding:8px 28px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:12px}
  #sendBtn:hover{background:#7d6ff0}
  #sendBtn:disabled{opacity:.5;cursor:not-allowed}
  #resp-section{flex:1;overflow:hidden;display:flex;flex-direction:column}
  #resp-section label{font-size:11px;color:#888;display:block;margin-bottom:4px}
  #respDisplay{flex:1;background:#111125;border:1px solid #222;border-radius:6px;padding:10px;font-family:'Fira Code',monospace;font-size:12px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:#b0b0d0}
  #resp-status{font-size:12px;margin-bottom:6px}
  #resp-status span{padding:2px 8px;border-radius:3px;font-weight:600}

  /* Right panel */
  #activity{width:280px;min-width:280px;background:#0e0e20;border-left:1px solid #222;display:flex;flex-direction:column}
  #activity h3{padding:10px 12px 8px;font-size:13px;color:#888;border-bottom:1px solid #222}
  #log-list{flex:1;overflow-y:auto;padding:6px}
  .log-entry{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #1a1a2e;font-size:11px;animation:fadeIn .3s}
  @keyframes fadeIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
  .log-entry .method-tag{font-size:9px;padding:1px 5px}
  .log-path{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#999}
  .log-status{font-weight:700;font-size:11px}
  .log-status.s2{color:#00b894}
  .log-status.s4{color:#ff7676}
  .log-status.s5{color:#d63031}
  .log-latency{color:#666;font-size:10px;min-width:40px;text-align:right}

  /* Bottom world canvas */
  #world-bar{height:180px;min-height:180px;background:#080818;border-top:1px solid #222;position:relative}
  #world-bar h4{position:absolute;top:6px;left:12px;font-size:11px;color:#555;z-index:1;pointer-events:none}
  #worldCanvas{width:100%;height:100%}

  /* Placeholder */
  .placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:#444;font-size:14px;text-align:center;padding:20px}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:#0a0a1a}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>

<!-- Config bar -->
<div id="config">
  <label>Base URL</label>
  <input type="text" id="baseUrl" value="http://localhost:8000/api/v2">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="raku_...">
  <button class="cfg-btn" onclick="testConnection()">Test Connection</button>
  <span id="connStatus">--</span>
  <div style="flex:1"></div>
  <button class="cfg-btn quick" onclick="quickStart()">Quick Start</button>
</div>

<!-- Main layout -->
<div id="main">
  <!-- Left sidebar -->
  <div id="sidebar"></div>

  <!-- Center panel -->
  <div id="center">
    <div class="placeholder" id="centerPlaceholder">Select an endpoint from the left panel<br>or click <strong>Quick Start</strong></div>
    <div id="ep-detail" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div id="ep-header">
        <h2><span class="method-tag" id="detailMethod"></span><span id="ep-path-display"></span></h2>
      </div>
      <div id="body-section">
        <label>Request Body (JSON)</label>
        <textarea id="reqBody" spellcheck="false"></textarea>
      </div>
      <button id="sendBtn" onclick="sendRequest()">Send</button>
      <div id="resp-section">
        <div id="resp-status"></div>
        <label>Response</label>
        <div id="respDisplay"></div>
      </div>
    </div>
  </div>

  <!-- Right activity log -->
  <div id="activity">
    <h3>API Activity Log</h3>
    <div id="log-list"></div>
  </div>
</div>

<!-- Bottom world visualizer -->
<div id="world-bar">
  <h4>World Visualizer</h4>
  <canvas id="worldCanvas"></canvas>
</div>

<script>
// ── Endpoints ──
const ENDPOINTS = [
  { group:"World", method:"POST", path:"/worlds", body:{name:"demo",gps_origin:{lat:39.9496,lng:-75.1503,alt:12},radius_m:500} },
  { group:"World", method:"DELETE", path:"/worlds/{world_id}", body:null },
  { group:"World", method:"POST", path:"/worlds/{world_id}/save", body:{} },
  { group:"World", method:"POST", path:"/worlds/{world_id}/load", body:{save_id:""} },
  { group:"Entity", method:"POST", path:"/worlds/{world_id}/entities", body:{type:"cube",name:"test",gps:{lat:39.9497,lng:-75.1502,alt:12}} },
  { group:"Entity", method:"PUT", path:"/worlds/{world_id}/entities/{entity_id}/transform", body:{position:[1,5,0]} },
  { group:"Entity", method:"DELETE", path:"/worlds/{world_id}/entities/{entity_id}", body:null },
  { group:"Physics", method:"POST", path:"/worlds/{world_id}/entities/{entity_id}/physics", body:{shape:"sphere",mass:1.0} },
  { group:"Physics", method:"POST", path:"/worlds/{world_id}/physics/step", body:{dt:0.016} },
  { group:"Observe", method:"GET", path:"/worlds/{world_id}/observe", body:null },
  { group:"Observe", method:"GET", path:"/worlds/{world_id}/observe/json", body:null },
  { group:"Agent", method:"POST", path:"/worlds/{world_id}/agents", body:{type:"guide",personality_prompt:"You are Benjamin Franklin",model:"claude-haiku-4-5-20251001"} },
  { group:"Agent", method:"POST", path:"/worlds/{world_id}/agents/{agent_id}/act", body:{observation:"A visitor approaches",player_action:"Hello!"} },
  { group:"Agent", method:"GET", path:"/worlds/{world_id}/agents/{agent_id}/observe", body:null },
];

// ── State ──
let currentWorldId = null;
let currentEntityId = null;
let currentAgentId = null;
let selectedEndpoint = null;
let entities = [];

// ── Build sidebar ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let currentGroup = '';
  ENDPOINTS.forEach((ep, i) => {
    if (ep.group !== currentGroup) {
      currentGroup = ep.group;
      const lbl = document.createElement('div');
      lbl.className = 'group-label';
      lbl.textContent = currentGroup;
      sb.appendChild(lbl);
    }
    const btn = document.createElement('button');
    btn.className = 'ep-btn';
    btn.dataset.index = i;
    btn.innerHTML = `<span class="method-tag ${ep.method}">${ep.method}</span><span class="ep-path">${ep.path}</span>`;
    btn.onclick = () => selectEndpoint(i);
    sb.appendChild(btn);
  });
}

function selectEndpoint(i) {
  selectedEndpoint = i;
  const ep = ENDPOINTS[i];

  // Update active button
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.ep-btn[data-index="${i}"]`);
  if (btn) btn.classList.add('active');

  // Show detail panel
  document.getElementById('centerPlaceholder').style.display = 'none';
  const detail = document.getElementById('ep-detail');
  detail.style.display = 'flex';

  const methodEl = document.getElementById('detailMethod');
  methodEl.textContent = ep.method;
  methodEl.className = `method-tag ${ep.method}`;
  document.getElementById('ep-path-display').textContent = ep.path;

  const bodySection = document.getElementById('body-section');
  const reqBody = document.getElementById('reqBody');
  if (ep.body !== null) {
    bodySection.style.display = 'block';
    reqBody.value = JSON.stringify(ep.body, null, 2);
  } else {
    bodySection.style.display = 'none';
    reqBody.value = '';
  }

  document.getElementById('resp-status').innerHTML = '';
  document.getElementById('respDisplay').textContent = '';
}

// ── Resolve path placeholders ──
function resolvePath(path) {
  let p = path;
  if (currentWorldId) p = p.replace('{world_id}', currentWorldId);
  if (currentEntityId) p = p.replace('{entity_id}', currentEntityId);
  if (currentAgentId) p = p.replace('{agent_id}', currentAgentId);
  return p;
}

// ── API call wrapper ──
async function apiCall(method, path, body) {
  const baseUrl = document.getElementById('baseUrl').value.replace(/\/+$/, '');
  const apiKey = document.getElementById('apiKey').value;
  const resolvedPath = resolvePath(path);

  const headers = { 'Content-Type': 'application/json' };
  if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

  const opts = { method, headers };
  if (body !== null && body !== undefined && method !== 'GET') {
    opts.body = JSON.stringify(body);
  }

  const start = performance.now();
  let resp, data, latency;
  try {
    resp = await fetch(baseUrl + resolvedPath, opts);
    latency = Math.round(performance.now() - start);
    try { data = await resp.json(); } catch { data = { raw: await resp.text() }; }
  } catch (err) {
    latency = Math.round(performance.now() - start);
    logActivity(method, resolvedPath, 0, latency);
    throw err;
  }

  logActivity(method, resolvedPath, resp.status, latency);

  // Auto-capture IDs from responses
  if (data) {
    if (data.world_id) currentWorldId = data.world_id;
    if (data.entity_id) currentEntityId = data.entity_id;
    if (data.agent_id) currentAgentId = data.agent_id;
    // Also check nested data
    if (data.data) {
      if (data.data.world_id) currentWorldId = data.data.world_id;
      if (data.data.entity_id) currentEntityId = data.data.entity_id;
      if (data.data.agent_id) currentAgentId = data.data.agent_id;
    }
  }

  return { status: resp.status, data };
}

// ── Send from UI ──
async function sendRequest() {
  if (selectedEndpoint === null) return;
  const ep = ENDPOINTS[selectedEndpoint];
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending...';

  let body = null;
  if (ep.body !== null) {
    try {
      body = JSON.parse(document.getElementById('reqBody').value);
    } catch (e) {
      showResponse(0, { error: 'Invalid JSON in request body: ' + e.message });
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      return;
    }
  }

  try {
    const result = await apiCall(ep.method, ep.path, body);
    showResponse(result.status, result.data);
    updateWorldViz(ep, result.data);
  } catch (err) {
    showResponse(0, { error: 'Network error: ' + err.message });
  }
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
}

function showResponse(status, data) {
  const statusEl = document.getElementById('resp-status');
  const cls = status >= 200 && status < 300 ? 's2' : status >= 400 && status < 500 ? 's4' : status >= 500 ? 's5' : '';
  const label = status === 0 ? 'ERR' : status;
  statusEl.innerHTML = `Status: <span class="log-status ${cls}">${label}</span>`;
  document.getElementById('respDisplay').textContent = JSON.stringify(data, null, 2);
}

// ── Activity log ──
function logActivity(method, path, status, latency) {
  const list = document.getElementById('log-list');
  const cls = status >= 200 && status < 300 ? 's2' : status >= 400 ? 's4' : '';
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="method-tag ${method}">${method}</span>
    <span class="log-path" title="${path}">${path}</span>
    <span class="log-status ${cls}">${status || 'ERR'}</span>
    <span class="log-latency">${latency}ms</span>`;
  list.prepend(entry);
  // Keep max 100 entries
  while (list.children.length > 100) list.removeChild(list.lastChild);
}

// ── Test connection ──
async function testConnection() {
  const status = document.getElementById('connStatus');
  status.textContent = 'Testing...';
  status.style.background = '#555';
  const baseUrl = document.getElementById('baseUrl').value.replace(/\/+$/, '');
  try {
    const resp = await fetch(baseUrl + '/worlds', { method: 'GET', headers: { 'Content-Type': 'application/json' } });
    if (resp.ok) {
      status.textContent = 'Connected';
      status.style.background = '#00b89444';
      status.style.color = '#00b894';
    } else {
      status.textContent = `HTTP ${resp.status}`;
      status.style.background = '#ff767644';
      status.style.color = '#ff7676';
    }
  } catch {
    status.textContent = 'Failed';
    status.style.background = '#ff767644';
    status.style.color = '#ff7676';
  }
}

// ── Quick Start ──
async function quickStart() {
  const btn = document.querySelector('.cfg-btn.quick');
  btn.disabled = true;
  btn.textContent = 'Running...';

  const delay = ms => new Promise(r => setTimeout(r, ms));

  try {
    // 1. Create world
    const w = await apiCall('POST', '/worlds', { name: 'demo', gps_origin: { lat: 39.9496, lng: -75.1503, alt: 12 }, radius_m: 500 });
    showResponse(w.status, w.data);
    await delay(300);

    // 2. Create 3 entities
    const entNames = [
      { type: 'cube', name: 'Independence Hall', gps: { lat: 39.9496, lng: -75.1503, alt: 12 } },
      { type: 'sphere', name: 'Liberty Bell', gps: { lat: 39.9498, lng: -75.1501, alt: 14 } },
      { type: 'cylinder', name: 'Lamp Post', gps: { lat: 39.9494, lng: -75.1505, alt: 10 } },
    ];
    const entIds = [];
    for (const ent of entNames) {
      const e = await apiCall('POST', '/worlds/{world_id}/entities', ent);
      updateWorldViz({ path: '/worlds/{world_id}/entities', method: 'POST' }, e.data);
      showResponse(e.status, e.data);
      const eid = e.data?.entity_id || e.data?.data?.entity_id;
      if (eid) entIds.push(eid);
      await delay(300);
    }

    // 3. Add physics to first 2
    for (let i = 0; i < Math.min(2, entIds.length); i++) {
      currentEntityId = entIds[i];
      const p = await apiCall('POST', '/worlds/{world_id}/entities/{entity_id}/physics', { shape: 'sphere', mass: 1.0 + i });
      showResponse(p.status, p.data);
      await delay(300);
    }

    // 4. Step physics 5 times
    for (let s = 0; s < 5; s++) {
      const st = await apiCall('POST', '/worlds/{world_id}/physics/step', { dt: 0.016 });
      updateWorldViz({ path: '/worlds/{world_id}/physics/step', method: 'POST' }, st.data);
      showResponse(st.status, st.data);
      await delay(300);
    }

    // 5. Observe JSON
    const obs = await apiCall('GET', '/worlds/{world_id}/observe/json', null);
    showResponse(obs.status, obs.data);
    updateWorldViz({ path: '/worlds/{world_id}/observe/json', method: 'GET' }, obs.data);

  } catch (err) {
    showResponse(0, { error: 'Quick Start failed: ' + err.message });
  }
  btn.disabled = false;
  btn.textContent = 'Quick Start';
}

// ── World Visualizer ──
const canvas = document.getElementById('worldCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  drawWorld();
}

const entityColors = ['#6c5ce7', '#00b894', '#fdcb6e', '#ff7676', '#74b9ff', '#a29bfe', '#fd79a8', '#55efc4'];

function updateWorldViz(ep, data) {
  if (!data) return;

  // On create_entity: add entity to local list
  if (ep.path.includes('/entities') && ep.method === 'POST' && !ep.path.includes('/physics')) {
    const eid = data.entity_id || data.data?.entity_id;
    const name = data.name || data.data?.name || 'entity';
    if (eid) {
      // Random position spread across canvas
      entities.push({
        id: eid,
        name: name,
        x: 80 + Math.random() * (canvas.width - 160),
        y: 30 + Math.random() * (canvas.height - 60),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        color: entityColors[entities.length % entityColors.length],
        radius: 8 + Math.random() * 6,
        hasPhysics: false,
      });
    }
    drawWorld();
  }

  // On step_physics: update positions
  if (ep.path.includes('/physics/step')) {
    entities.forEach(e => {
      if (e.hasPhysics) {
        e.vy += 0.5; // gravity
      }
      e.x += e.vx;
      e.y += e.vy;
      // Bounce off walls
      if (e.x < e.radius || e.x > canvas.width - e.radius) { e.vx *= -0.8; e.x = Math.max(e.radius, Math.min(canvas.width - e.radius, e.x)); }
      if (e.y < e.radius || e.y > canvas.height - e.radius) { e.vy *= -0.6; e.y = Math.max(e.radius, Math.min(canvas.height - e.radius, e.y)); }
    });
    drawWorld();
  }

  // On observe: refresh from response if entities are listed
  if (ep.path.includes('/observe') && data.entities) {
    // Merge positions if available
    (data.entities || []).forEach(re => {
      const found = entities.find(e => e.id === re.entity_id);
      if (found && re.position) {
        found.x = 80 + ((re.position[0] || 0) + 50) * 3;
        found.y = 30 + ((re.position[1] || 0) + 50) * 1.5;
      }
    });
    drawWorld();
  }
}

function drawWorld() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

  // Origin crosshair
  const cx = canvas.width / 2, cy = canvas.height / 2;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
  ctx.setLineDash([]);

  if (entities.length === 0) {
    ctx.fillStyle = '#333';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('No entities yet — create some or run Quick Start', cx, cy);
    return;
  }

  // Draw entities
  entities.forEach(e => {
    // Glow
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI * 2);
    ctx.fillStyle = e.color + '22';
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fillStyle = e.color;
    ctx.fill();

    // Label
    ctx.fillStyle = '#ccc';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(e.name, e.x, e.y + e.radius + 14);
  });
}

// ── Init ──
buildSidebar();
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in... — RakuAI</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .callback-container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
        .status { color: #888; font-size: 0.9rem; }
        .error { color: #e74c3c; display: none; }
        .error a { color: #6c5ce7; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner" id="spinner"></div>
        <h2 id="heading">Signing in with Google...</h2>
        <p class="status" id="status">Completing authentication</p>
        <p class="error" id="error">
            Something went wrong. <a href="/">Return to RakuAI</a>
        </p>
    </div>

    <script src="../../js/api-client.js"></script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var error = params.get('error');

        if (error || !code) {
            showError(error || 'No authorization code received');
            return;
        }

        // Exchange authorization code via backend
        var redirectUri = window.location.origin + '/auth/google/callback.html';

        RakuAPI.googleCodeExchange(code, redirectUri)
            .then(function(data) {
                document.getElementById('heading').textContent = 'Welcome!';
                document.getElementById('status').textContent = 'Redirecting...';

                // Check for pending prompt
                var pendingPrompt = sessionStorage.getItem('raku_pending_prompt');
                if (pendingPrompt) {
                    sessionStorage.removeItem('raku_pending_prompt');
                    window.location.href = '/?prompt=' + encodeURIComponent(pendingPrompt);
                } else {
                    window.location.href = '/';
                }
            })
            .catch(function(err) {
                showError(err.message || 'Authentication failed');
            });

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('heading').textContent = 'Sign-in Failed';
            document.getElementById('status').style.display = 'none';
            var errorEl = document.getElementById('error');
            errorEl.style.display = 'block';
            errorEl.textContent = msg + '. ';
            var link = document.createElement('a');
            link.href = '/';
            link.textContent = 'Return to RakuAI';
            errorEl.appendChild(link);
        }
    })();
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" role="img" aria-label="RakuAI — AI-Native Game Engine cover banner">
  <title>RakuAI — AI-Native Game Engine</title>
  <desc>LinkedIn cover banner for RakuAI. Canonical strapline: rakuai.com · 5 Patents · 9,500+ API Endpoints · XR-Ready.</desc>

  <defs>
    <!-- Dark navy backdrop with subtle violet glow toward the right edge. -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#070713"/>
      <stop offset="55%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#140a30"/>
    </linearGradient>
    <!-- Primary brand gradient: violet → cyan, matching style.css --accent / --accent-bright. -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a388ff"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <!-- Deeper variant for the accent rule. -->
    <linearGradient id="brandDeep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="60%" style="stop-color:#a388ff"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <!-- Soft radial glow behind the kanji. -->
    <radialGradient id="kanjiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a388ff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#a388ff;stop-opacity:0"/>
    </radialGradient>
    <!-- Tiny radial for the GPS pulse dot. -->
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bgGrad)"/>

  <!-- Diagonal grid lines (very subtle, hint of "spatial" without overwhelming the type). -->
  <g opacity="0.07" stroke-linecap="round">
    <line x1="-100" y1="0"   x2="1228" y2="191" stroke="#a388ff" stroke-width="0.5"/>
    <line x1="100"  y1="0"   x2="1428" y2="191" stroke="#a388ff" stroke-width="0.5"/>
    <line x1="300"  y1="0"   x2="1628" y2="191" stroke="#00cec9" stroke-width="0.5"/>
    <line x1="-300" y1="0"   x2="1028" y2="191" stroke="#00cec9" stroke-width="0.5"/>
    <line x1="-500" y1="0"   x2="828"  y2="191" stroke="#a388ff" stroke-width="0.5"/>
  </g>

  <!-- Constellation dots, suggestive of GPS coordinate anchors -->
  <g fill="#00cec9" opacity="0.55">
    <circle cx="660"  cy="42"  r="1.5"/>
    <circle cx="720"  cy="155" r="1.2"/>
    <circle cx="785"  cy="60"  r="1.8"/>
    <circle cx="840"  cy="120" r="1.4"/>
    <circle cx="930"  cy="48"  r="1.2"/>
    <circle cx="990"  cy="142" r="1.6"/>
    <circle cx="1058" cy="80"  r="1.3"/>
  </g>
  <g fill="#a388ff" opacity="0.5">
    <circle cx="700"  cy="100" r="1.2"/>
    <circle cx="810"  cy="170" r="1.4"/>
    <circle cx="900"  cy="95"  r="1.6"/>
    <circle cx="1010" cy="35"  r="1.3"/>
  </g>

  <!-- Pulse dot (GPS-anchor cue) near the strapline -->
  <circle cx="708" cy="160" r="14" fill="url(#pulse)"/>
  <circle cx="708" cy="160" r="2.5" fill="#00cec9"/>

  <!-- Bottom accent rule -->
  <rect x="0" y="186" width="1128" height="5" fill="url(#brandDeep)"/>

  <!-- Left block: kanji glow + RakuAI mark -->
  <circle cx="92" cy="95" r="80" fill="url(#kanjiGlow)"/>
  <text x="92" y="128" text-anchor="middle"
        font-family="'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif"
        font-size="100" font-weight="700" fill="url(#brand)">楽</text>

  <!-- Divider -->
  <line x1="186" y1="38" x2="186" y2="153" stroke="#2a2a48" stroke-width="1"/>

  <!-- RAKUAI wordmark + tagline -->
  <text x="216" y="98"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="58" font-weight="800" letter-spacing="0.06em" fill="url(#brand)">RAKUAI<tspan font-size="22" dy="-30">&#8482;</tspan></text>
  <text x="218" y="128"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="15" font-weight="600" fill="#cfcfe0" letter-spacing="0.30em">AI-NATIVE GAME ENGINE</text>

  <!-- Strapline (canonical numbers from canonical/public-metrics.yaml) -->
  <text x="218" y="166"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="13" font-weight="500" fill="#9090b0" letter-spacing="0.04em">
    rakuai.com  ·  5 Patents  ·  9,500+ API Endpoints  ·  XR-Ready
  </text>

  <!-- Right edge: priority-date badge -->
  <g>
    <rect x="940" y="48" width="160" height="95" rx="10"
          fill="#0d0d22" stroke="#2a2a48" stroke-width="1"/>
    <text x="1020" y="78" text-anchor="middle"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="11" font-weight="700" fill="#00cec9" letter-spacing="0.20em">PATENT PRIORITY</text>
    <text x="1020" y="108" text-anchor="middle"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="26" font-weight="800" fill="url(#brand)">JULY 2012</text>
    <text x="1020" y="130" text-anchor="middle"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="10" fill="#9090b0" letter-spacing="0.10em">5 GRANTED · MORE PENDING</text>
  </g>
</svg>

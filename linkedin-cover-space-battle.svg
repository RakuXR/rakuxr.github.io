<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="40%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d0520"/>
    </linearGradient>
    <linearGradient id="beam1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="beam2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a388ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a388ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="beam3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="ship-hull" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334"/>
      <stop offset="100%" style="stop-color:#112"/>
    </linearGradient>
    <linearGradient id="engine-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cec9"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nebula1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nebula2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00cec9;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00cec9;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="planet-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <radialGradient id="explosion1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9"/>
      <stop offset="20%" style="stop-color:#ffaa00;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#ff4444;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="explosion2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.7"/>
      <stop offset="30%" style="stop-color:#00cec9;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#00cec9"/>
      <stop offset="100%" style="stop-color:#a388ff"/>
    </linearGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="1128" height="191" fill="url(#bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="200" cy="60" rx="250" ry="100" fill="url(#nebula1)"/>
  <ellipse cx="850" cy="130" rx="300" ry="120" fill="url(#nebula2)"/>
  <ellipse cx="600" cy="20" rx="180" ry="60" fill="url(#nebula1)" opacity="0.5"/>

  <!-- Stars - dense field -->
  <g fill="white">
    <!-- Bright stars -->
    <circle cx="45" cy="23" r="1.2" opacity="0.9"/><circle cx="120" cy="67" r="0.8" opacity="0.7"/>
    <circle cx="180" cy="15" r="1.0" opacity="0.8"/><circle cx="250" cy="145" r="0.6" opacity="0.5"/>
    <circle cx="310" cy="38" r="1.1" opacity="0.9"/><circle cx="380" cy="170" r="0.7" opacity="0.6"/>
    <circle cx="420" cy="85" r="0.9" opacity="0.7"/><circle cx="490" cy="25" r="1.3" opacity="0.85"/>
    <circle cx="560" cy="155" r="0.8" opacity="0.6"/><circle cx="630" cy="42" r="1.0" opacity="0.8"/>
    <circle cx="700" cy="168" r="0.7" opacity="0.5"/><circle cx="760" cy="18" r="1.2" opacity="0.9"/>
    <circle cx="830" cy="95" r="0.6" opacity="0.55"/><circle cx="890" cy="30" r="1.1" opacity="0.8"/>
    <circle cx="950" cy="160" r="0.9" opacity="0.7"/><circle cx="1020" cy="55" r="1.0" opacity="0.75"/>
    <circle cx="1080" cy="140" r="0.8" opacity="0.6"/><circle cx="1110" cy="20" r="0.7" opacity="0.5"/>
    <!-- Dim stars -->
    <circle cx="70" cy="100" r="0.4" opacity="0.3"/><circle cx="150" cy="130" r="0.5" opacity="0.35"/>
    <circle cx="230" cy="80" r="0.4" opacity="0.3"/><circle cx="340" cy="120" r="0.5" opacity="0.4"/>
    <circle cx="450" cy="50" r="0.4" opacity="0.3"/><circle cx="530" cy="110" r="0.3" opacity="0.25"/>
    <circle cx="610" cy="175" r="0.4" opacity="0.3"/><circle cx="680" cy="60" r="0.5" opacity="0.35"/>
    <circle cx="750" cy="140" r="0.4" opacity="0.3"/><circle cx="810" cy="45" r="0.3" opacity="0.25"/>
    <circle cx="870" cy="155" r="0.5" opacity="0.35"/><circle cx="940" cy="75" r="0.4" opacity="0.3"/>
    <circle cx="1000" cy="120" r="0.3" opacity="0.25"/><circle cx="1060" cy="85" r="0.5" opacity="0.35"/>
    <circle cx="35" cy="160" r="0.4" opacity="0.3"/><circle cx="105" cy="45" r="0.3" opacity="0.25"/>
    <circle cx="195" cy="170" r="0.5" opacity="0.4"/><circle cx="280" cy="55" r="0.4" opacity="0.3"/>
    <circle cx="365" cy="90" r="0.3" opacity="0.25"/><circle cx="475" cy="140" r="0.5" opacity="0.35"/>
    <circle cx="585" cy="35" r="0.4" opacity="0.3"/><circle cx="655" cy="120" r="0.3" opacity="0.25"/>
    <circle cx="725" cy="80" r="0.5" opacity="0.35"/><circle cx="795" cy="170" r="0.4" opacity="0.3"/>
  </g>

  <!-- Distant planet (partial, bottom right) -->
  <circle cx="980" cy="220" r="80" fill="url(#planet-g)" stroke="#222244" stroke-width="0.5" opacity="0.6"/>
  <ellipse cx="980" cy="220" rx="82" ry="12" fill="none" stroke="#334" stroke-width="1.5" opacity="0.4" transform="rotate(-15 980 220)"/>

  <!-- === CAPITAL SHIP (Yamato-inspired space battleship) === -->
  <g transform="translate(120, 55)" filter="url(#glow)">
    <!-- Main hull - long sleek body -->
    <polygon points="0,40 30,30 180,25 280,22 350,20 380,18 400,20 420,25 420,50 400,55 380,57 350,55 280,53 180,50 30,45" fill="url(#ship-hull)" stroke="#445" stroke-width="0.5"/>
    <!-- Bridge/command tower -->
    <polygon points="200,25 210,10 240,8 260,8 270,12 280,25" fill="#223" stroke="#556" stroke-width="0.5"/>
    <rect x="225" y="10" width="20" height="4" rx="1" fill="#00cec9" opacity="0.7"/>
    <!-- Bow - pointed prow with wave motion gun -->
    <polygon points="0,40 -30,37 -50,38 0,43" fill="#223" stroke="#445" stroke-width="0.5"/>
    <line x1="-50" y1="38" x2="-80" y2="37" stroke="#556" stroke-width="1.5"/>
    <!-- Engine nacelles -->
    <rect x="400" y="18" width="30" height="8" rx="2" fill="#112"/>
    <rect x="400" y="48" width="30" height="8" rx="2" fill="#112"/>
    <!-- Engine glow -->
    <ellipse cx="432" cy="22" rx="8" ry="5" fill="#00cec9" opacity="0.8" filter="url(#glow)"/>
    <ellipse cx="432" cy="52" rx="8" ry="5" fill="#00cec9" opacity="0.8" filter="url(#glow)"/>
    <rect x="432" y="18" width="40" height="8" rx="2" fill="url(#engine-glow)" opacity="0.5"/>
    <rect x="432" y="48" width="40" height="8" rx="2" fill="url(#engine-glow)" opacity="0.5"/>
    <!-- Hull detail lines -->
    <line x1="60" y1="32" x2="350" y2="22" stroke="#445" stroke-width="0.3" opacity="0.6"/>
    <line x1="60" y1="43" x2="350" y2="53" stroke="#445" stroke-width="0.3" opacity="0.6"/>
    <!-- Windows -->
    <g fill="#a388ff" opacity="0.6">
      <rect x="100" y="33" width="3" height="2" rx="0.5"/>
      <rect x="120" y="32" width="3" height="2" rx="0.5"/>
      <rect x="140" y="31" width="3" height="2" rx="0.5"/>
      <rect x="160" y="30" width="3" height="2" rx="0.5"/>
      <rect x="300" y="25" width="3" height="2" rx="0.5"/>
      <rect x="320" y="24" width="3" height="2" rx="0.5"/>
      <rect x="340" y="23" width="3" height="2" rx="0.5"/>
    </g>
    <!-- Turrets -->
    <g fill="#334" stroke="#556" stroke-width="0.3">
      <circle cx="80" cy="34" r="4"/><line x1="80" y1="34" x2="68" y2="30" stroke="#556" stroke-width="1"/>
      <circle cx="150" cy="29" r="4"/><line x1="150" y1="29" x2="138" y2="25" stroke="#556" stroke-width="1"/>
    </g>
  </g>

  <!-- === WAVE MOTION GUN BEAM === -->
  <g filter="url(#glow-strong)">
    <!-- Main beam - teal energy blast from bow -->
    <polygon points="40,93 -20,91 -20,96 40,98" fill="#00cec9" opacity="0.9"/>
    <polygon points="40,91 -80,88 -80,100 40,100" fill="#00cec9" opacity="0.4"/>
    <polygon points="-20,86 -200,82 -200,105 -20,102" fill="url(#beam1)" opacity="0.25"/>
  </g>

  <!-- === ENEMY SHIPS (coming from right) === -->
  <g>
    <!-- Enemy 1 -->
    <g transform="translate(850, 35)">
      <polygon points="0,8 -20,0 -20,16 -5,12 -5,4" fill="#331122" stroke="#663344" stroke-width="0.5"/>
      <ellipse cx="-22" cy="8" rx="3" ry="4" fill="#ff4444" opacity="0.6"/>
    </g>
    <!-- Enemy 2 -->
    <g transform="translate(900, 65)">
      <polygon points="0,8 -20,0 -20,16 -5,12 -5,4" fill="#331122" stroke="#663344" stroke-width="0.5"/>
      <ellipse cx="-22" cy="8" rx="3" ry="4" fill="#ff4444" opacity="0.6"/>
    </g>
    <!-- Enemy 3 -->
    <g transform="translate(820, 100)">
      <polygon points="0,8 -20,0 -20,16 -5,12 -5,4" fill="#331122" stroke="#663344" stroke-width="0.5"/>
      <ellipse cx="-22" cy="8" rx="3" ry="4" fill="#ff4444" opacity="0.6"/>
    </g>
    <!-- Enemy 4 (distant) -->
    <g transform="translate(950, 20) scale(0.6)">
      <polygon points="0,8 -20,0 -20,16 -5,12 -5,4" fill="#221118" stroke="#442233" stroke-width="0.5"/>
    </g>
    <!-- Enemy 5 (distant) -->
    <g transform="translate(970, 110) scale(0.6)">
      <polygon points="0,8 -20,0 -20,16 -5,12 -5,4" fill="#221118" stroke="#442233" stroke-width="0.5"/>
    </g>
  </g>

  <!-- === ENEMY LASER FIRE (red, coming from right) === -->
  <g filter="url(#glow)">
    <line x1="830" y1="43" x2="620" y2="75" stroke="#ff4444" stroke-width="1.5" opacity="0.7"/>
    <line x1="880" y1="73" x2="650" y2="90" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="108" x2="580" y2="95" stroke="#ff4444" stroke-width="1.2" opacity="0.6"/>
    <line x1="930" y1="28" x2="700" y2="60" stroke="#ff6b6b" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- === FRIENDLY FIRE (teal/purple, from ship) === -->
  <g filter="url(#glow)">
    <!-- Turret fire -->
    <line x1="188" y1="84" x2="500" y2="50" stroke="#a388ff" stroke-width="1.5" opacity="0.8"/>
    <line x1="230" y1="80" x2="550" y2="35" stroke="#00cec9" stroke-width="1" opacity="0.6"/>
    <line x1="250" y1="88" x2="600" y2="100" stroke="#a388ff" stroke-width="1.2" opacity="0.7"/>
  </g>

  <!-- === FIGHTER ESCORTS === -->
  <g>
    <!-- Fighter 1 -->
    <g transform="translate(350, 30)">
      <polygon points="0,3 -8,0 -8,6" fill="#223" stroke="#00cec9" stroke-width="0.3"/>
      <line x1="-8" y1="3" x2="-15" y2="3" stroke="#00cec9" stroke-width="0.5" opacity="0.5"/>
    </g>
    <!-- Fighter 2 -->
    <g transform="translate(370, 130)">
      <polygon points="0,3 -8,0 -8,6" fill="#223" stroke="#00cec9" stroke-width="0.3"/>
      <line x1="-8" y1="3" x2="-15" y2="3" stroke="#00cec9" stroke-width="0.5" opacity="0.5"/>
    </g>
    <!-- Fighter 3 -->
    <g transform="translate(300, 145)">
      <polygon points="0,3 -8,0 -8,6" fill="#223" stroke="#a388ff" stroke-width="0.3"/>
      <line x1="-8" y1="3" x2="-15" y2="3" stroke="#a388ff" stroke-width="0.5" opacity="0.5"/>
    </g>
  </g>

  <!-- === EXPLOSIONS === -->
  <circle cx="700" cy="55" r="18" fill="url(#explosion1)" filter="url(#glow-soft)"/>
  <circle cx="650" cy="90" r="12" fill="url(#explosion2)" filter="url(#glow)"/>
  <circle cx="760" cy="110" r="8" fill="url(#explosion1)" opacity="0.6" filter="url(#glow)"/>

  <!-- === DEBRIS === -->
  <g fill="#443" opacity="0.5">
    <rect x="710" y="48" width="4" height="2" transform="rotate(30 712 49)"/>
    <rect x="720" y="62" width="3" height="1.5" transform="rotate(-45 721 63)"/>
    <rect x="660" y="82" width="3" height="2" transform="rotate(60 661 83)"/>
    <rect x="755" y="115" width="2" height="1" transform="rotate(15 756 115)"/>
  </g>

  <!-- === TEXT OVERLAY (right side) === -->
  <g>
    <!-- Japanese tagline -->
    <text x="1108" y="50" text-anchor="end" font-family="'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif" font-size="22" font-weight="700" fill="#a388ff" opacity="0.85" filter="url(#glow)">宇宙戦艦で戦え。</text>
    <!-- English -->
    <text x="1108" y="78" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="600" fill="#9090b0" letter-spacing="0.15em">DESCRIBE ANY GAME. PLAY IT INSTANTLY.</text>
    <!-- Stats line -->
    <text x="1108" y="105" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" fill="#666688">rakuai.com · 5 Patents · 2,718 APIs · 16 Subsystems</text>
    <!-- GDC badge -->
    <text x="1108" y="135" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="700" fill="#00cec9">GDC 2026 · San Francisco · March 17-21</text>
    <text x="1108" y="155" text-anchor="end" font-family="'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif" font-size="11" fill="#555577">AIネイティブ ゲームエンジン</text>
  </g>

  <!-- Accent line at bottom -->
  <rect x="0" y="188" width="1128" height="3" fill="url(#accent-line)"/>
</svg>

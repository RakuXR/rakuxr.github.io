<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Games — RakuAI</title>
    <meta name="description" content="Browse games created by the RakuAI community. Play instantly in your browser.">
    <meta property="og:title" content="Discover Games — RakuAI">
    <meta property="og:description" content="Browse games created by the RakuAI community. Play instantly in your browser.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rakuai.com/discover.html">
    <link rel="stylesheet" href="style.css">
    <style>
        .discover-hero {
            text-align: center;
            padding: 3rem 1rem 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .discover-hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .discover-hero p { color: #888; font-size: 1.1rem; }

        .genre-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            padding: 0 1rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .genre-btn {
            background: #1a1a2e;
            border: 1px solid #333;
            color: #ccc;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .genre-btn:hover { border-color: #6c5ce7; color: #fff; }
        .genre-btn.active { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 0 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
        }
        .game-card:hover { border-color: #6c5ce7; transform: translateY(-2px); }
        .game-card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #fff; }
        .game-card .genre-tag {
            display: inline-block;
            background: #2d2b55;
            color: #a29bfe;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .game-card .description { color: #888; font-size: 0.9rem; line-height: 1.4; margin-bottom: 1rem; }
        .game-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #666;
        }
        .play-btn {
            background: #6c5ce7;
            color: #fff;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .play-btn:hover { background: #5b4bd5; }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: #666;
        }
        .empty-state h3 { color: #888; margin-bottom: 0.5rem; }

        .load-more {
            display: block;
            margin: 0 auto 3rem;
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .load-more:hover { border-color: #6c5ce7; color: #fff; }

        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 1rem;
        }
        .sort-bar .result-count { color: #666; font-size: 0.9rem; }
        .sort-bar select {
            background: #1a1a2e;
            color: #ccc;
            border: 1px solid #333;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">RakuAI</a>
        <div class="nav-links">
            <a href="/">Create</a>
            <a href="/discover.html" class="active">Discover</a>
            <a href="/my-games.html">My Games</a>
            <a href="/pricing.html">Pricing</a>
        </div>
    </nav>

    <section class="discover-hero">
        <h1>Discover Games</h1>
        <p>Browse games created by the RakuAI community. Click any game to play it instantly.</p>
    </section>

    <div class="genre-filters" id="genre-filters">
        <button class="genre-btn active" data-genre="">All</button>
    </div>

    <div class="sort-bar">
        <span class="result-count" id="result-count"></span>
        <select id="sort-select">
            <option value="recent">Newest First</option>
            <option value="popular">Most Popular</option>
        </select>
    </div>

    <div class="game-grid" id="game-grid"></div>

    <button class="load-more" id="load-more" style="display:none;">Load More</button>

    <div class="empty-state" id="empty-state" style="display:none;">
        <h3>No games yet</h3>
        <p>Be the first to <a href="/" style="color:#6c5ce7;">create and publish a game</a>!</p>
    </div>

    <script src="js/api-client.js"></script>
    <script>
    (function() {
        var currentGenre = '';
        var currentSort = 'recent';
        var currentOffset = 0;
        var PAGE_SIZE = 20;
        var totalGames = 0;

        var grid = document.getElementById('game-grid');
        var loadMoreBtn = document.getElementById('load-more');
        var emptyState = document.getElementById('empty-state');
        var resultCount = document.getElementById('result-count');
        var sortSelect = document.getElementById('sort-select');

        // Load genres
        loadGenres();

        // Initial load
        loadGames(true);

        // Sort change
        sortSelect.addEventListener('change', function() {
            currentSort = this.value;
            currentOffset = 0;
            loadGames(true);
        });

        // Load more
        loadMoreBtn.addEventListener('click', function() {
            currentOffset += PAGE_SIZE;
            loadGames(false);
        });

        async function loadGenres() {
            try {
                var data = await RakuAPI.apiFetch('/api/v1/community/discover/genres');
                if (!data.ok) return;
                var result = await data.json();
                var container = document.getElementById('genre-filters');

                var KNOWN_GENRES = [
                    'puzzle', 'card_battle', 'space_shooter', 'runner', 'platformer',
                    'tower_defense', 'racing', 'rpg', 'fighting', 'rhythm',
                    'sports', 'simulation', 'sandbox'
                ];

                KNOWN_GENRES.forEach(function(genre) {
                    var btn = document.createElement('button');
                    btn.className = 'genre-btn';
                    btn.dataset.genre = genre;
                    btn.textContent = genre.replace(/_/g, ' ');

                    // Add count if available
                    var found = result.genres.find(function(g) { return g.genre === genre; });
                    if (found) {
                        btn.textContent += ' (' + found.count + ')';
                    }

                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.genre-btn').forEach(function(b) { b.classList.remove('active'); });
                        btn.classList.add('active');
                        currentGenre = genre;
                        currentOffset = 0;
                        loadGames(true);
                    });
                    container.appendChild(btn);
                });
            } catch (e) {
                // Genres are optional UI enhancement
            }
        }

        async function loadGames(replace) {
            try {
                var url = '/api/v1/community/discover?sort=' + currentSort
                    + '&offset=' + currentOffset
                    + '&limit=' + PAGE_SIZE;
                if (currentGenre) {
                    url += '&genre=' + encodeURIComponent(currentGenre);
                }

                var resp = await RakuAPI.apiFetch(url);
                if (!resp.ok) throw new Error('Failed to load');
                var data = await resp.json();

                totalGames = data.total;
                resultCount.textContent = totalGames + ' game' + (totalGames !== 1 ? 's' : '');

                if (replace) {
                    grid.innerHTML = '';
                }

                if (data.games.length === 0 && currentOffset === 0) {
                    emptyState.style.display = 'block';
                    loadMoreBtn.style.display = 'none';
                    return;
                }

                emptyState.style.display = 'none';

                data.games.forEach(function(game) {
                    var card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = '<h3>' + escapeHtml(game.title) + '</h3>'
                        + '<span class="genre-tag">' + escapeHtml(game.genre.replace(/_/g, ' ')) + '</span>'
                        + '<p class="description">' + escapeHtml(truncate(game.description, 120)) + '</p>'
                        + '<div class="card-footer">'
                        + '<span>' + timeAgo(game.created_at) + '</span>'
                        + '<button class="play-btn">Play</button>'
                        + '</div>';

                    card.addEventListener('click', function() {
                        window.location.href = '/share.html?id=' + encodeURIComponent(game.id);
                    });
                    grid.appendChild(card);
                });

                // Show/hide load more
                if (currentOffset + PAGE_SIZE < totalGames) {
                    loadMoreBtn.style.display = 'block';
                } else {
                    loadMoreBtn.style.display = 'none';
                }
            } catch (e) {
                if (currentOffset === 0) {
                    emptyState.style.display = 'block';
                }
            }
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.substring(0, max) + '...' : str;
        }

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            var diff = Date.now() - new Date(dateStr).getTime();
            var mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            var hours = Math.floor(mins / 60);
            if (hours < 24) return hours + 'h ago';
            var days = Math.floor(hours / 24);
            if (days < 30) return days + 'd ago';
            return new Date(dateStr).toLocaleDateString();
        }

        // Wire "All" genre button
        document.querySelector('.genre-btn[data-genre=""]').addEventListener('click', function() {
            document.querySelectorAll('.genre-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentGenre = '';
            currentOffset = 0;
            loadGames(true);
        });
    })();
    </script>
</body>
</html>

<div class="login-container">
    <!-- Signed-out: API-key sign-in form -->
    <div id="signed-out-state">
        <h1>開發者登入</h1>
        <p class="subtitle">貼上你的 <code>raku_</code> API 金鑰以取得 session token。新開發者：<a href="register.html">在這裡申請使用權</a>。</p>

        <form class="login-card" id="login-form" autocomplete="off">
            <label for="api-key">API 金鑰</label>
            <input
                type="password"
                id="api-key"
                name="api-key"
                placeholder="raku_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                spellcheck="false"
                autocapitalize="off"
                autocomplete="off"
                required
            >
            <label class="reveal-toggle">
                <input type="checkbox" id="reveal-key"> 顯示金鑰
            </label>

            <button type="submit" id="submit-btn">登入</button>

            <div class="error-box" id="error-box"></div>
            <div class="success-box" id="success-box">已登入。正在跳轉…</div>
        </form>

        <p class="footer-note">
            還沒有 API 金鑰？<a href="register.html">接受 NDA 並申請開發者使用權</a>，待管理員核准帳號後再回來登入。
        </p>
    </div>

    <!-- Signed-in: show user info + Sign Out -->
    <div id="signed-in-state" class="signed-in-state">
        <h1>你已登入</h1>
        <p class="subtitle">Session token 已在你的瀏覽器中快取。請使用導覽列中的開發者入口連結。</p>

        <div class="user-card">
            <div class="email" id="signed-in-email">—</div>
            <span class="tier" id="signed-in-tier">—</span>
        </div>

        <div class="actions">
            <a class="btn-secondary" href="register.html">前往入口</a>
            <button type="button" class="btn-secondary" id="signout-btn">登出</button>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    var API_BASE = window.RAKU_API_BASE || (function() {
        var h = window.location.hostname;
        if (h === 'localhost' || h === '127.0.0.1' || h === '') return 'http://localhost:8000';
        if (h === 'staging.rakuai.com') return 'https://raku-api-staging.fly.dev';
        return 'https://api.rakuai.com';
    })();

    const TOKEN_KEY   = 'raku_access_token';
    const REFRESH_KEY = 'raku_refresh_token';
    const USER_KEY    = 'raku_user';

    const signedOutEl = document.getElementById('signed-out-state');
    const signedInEl  = document.getElementById('signed-in-state');
    const form        = document.getElementById('login-form');
    const input       = document.getElementById('api-key');
    const reveal      = document.getElementById('reveal-key');
    const submitBtn   = document.getElementById('submit-btn');
    const errorBox    = document.getElementById('error-box');
    const successBox  = document.getElementById('success-box');
    const emailEl     = document.getElementById('signed-in-email');
    const tierEl      = document.getElementById('signed-in-tier');
    const signOutBtn  = document.getElementById('signout-btn');

    function showSignedIn(user) {
        signedOutEl.style.display = 'none';
        signedInEl.style.display  = 'block';
        emailEl.textContent = (user && user.email) || '（未知的電子郵件）';
        tierEl.textContent  = (user && user.tier)  || '未知';
    }
    function showSignedOut() {
        signedOutEl.style.display = 'block';
        signedInEl.style.display  = 'none';
    }
    function showError(msg) {
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
        successBox.style.display = 'none';
    }
    function clearError() {
        errorBox.style.display = 'none';
        errorBox.textContent = '';
    }

    var existing = localStorage.getItem(TOKEN_KEY);
    if (existing) {
        var userStr = localStorage.getItem(USER_KEY);
        var user = null;
        try { user = userStr ? JSON.parse(userStr) : null; } catch (_) { user = null; }
        showSignedIn(user);
    } else {
        showSignedOut();
    }

    reveal.addEventListener('change', function() {
        input.type = reveal.checked ? 'text' : 'password';
    });

    signOutBtn.addEventListener('click', function() {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(REFRESH_KEY);
        localStorage.removeItem(USER_KEY);
        showSignedOut();
        input.value = '';
        clearError();
    });

    form.addEventListener('submit', async function(ev) {
        ev.preventDefault();
        clearError();

        var apiKey = (input.value || '').trim();
        if (!apiKey) {
            showError('請貼上你的 API 金鑰。');
            return;
        }
        if (apiKey.indexOf('raku_') !== 0) {
            showError('這看起來不像 raku_ API 金鑰。請確認你複製的是完整的金鑰值。');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '登入中…';

        try {
            var resp = await fetch(API_BASE + '/api/v1/auth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ api_key: apiKey }),
            });

            if (resp.status === 401) {
                showError('該 API 金鑰無效、已撤銷，或沒有關聯的開發者帳號。請再次確認金鑰，或在還沒有時申請使用權。');
                submitBtn.disabled = false;
                submitBtn.textContent = '登入';
                return;
            }
            if (resp.status === 422) {
                showError('API 金鑰欄位缺少或格式錯誤。');
                submitBtn.disabled = false;
                submitBtn.textContent = '登入';
                return;
            }
            if (!resp.ok) {
                showError('登入失敗（HTTP ' + resp.status + '）。請再試一次，若持續發生請聯絡客服。');
                submitBtn.disabled = false;
                submitBtn.textContent = '登入';
                return;
            }

            var data = await resp.json();
            if (!data || !data.access_token) {
                showError('伺服器回應格式無法辨識。登入未完成。');
                submitBtn.disabled = false;
                submitBtn.textContent = '登入';
                return;
            }

            localStorage.setItem(TOKEN_KEY, data.access_token);
            if (data.refresh_token) localStorage.setItem(REFRESH_KEY, data.refresh_token);
            if (data.user) localStorage.setItem(USER_KEY, JSON.stringify(data.user));
            input.value = '';

            successBox.style.display = 'block';

            var ret = new URLSearchParams(window.location.search).get('return');
            var safeReturn = 'register.html';
            if (ret && ret.charAt(0) === '/' && ret.charAt(1) !== '/' && ret.charAt(1) !== '\\') {
                try {
                    var resolved = new URL(ret, window.location.origin);
                    if (resolved.origin === window.location.origin) {
                        safeReturn = resolved.pathname + resolved.search + resolved.hash;
                    }
                } catch (_) {
                }
            }
            setTimeout(function() { window.location.href = safeReturn; }, 600);

        } catch (e) {
            showError('連線 API 時發生網路錯誤。請檢查連線後再試。');
            submitBtn.disabled = false;
            submitBtn.textContent = '登入';
        }
    });
})();
</script>

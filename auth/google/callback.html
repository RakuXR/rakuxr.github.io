<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in... — RakuAI</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .callback-container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #333;
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
        .status { color: #888; font-size: 0.9rem; }
        .error { color: #e74c3c; display: none; }
        .error a { color: #6c5ce7; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner" id="spinner"></div>
        <h2 id="heading">Signing in with Google...</h2>
        <p class="status" id="status">Completing authentication</p>
        <p class="error" id="error">
            Something went wrong. <a href="/">Return to RakuAI</a>
        </p>
    </div>

    <script src="../../js/api-client.js"></script>
    <script>
    (function() {
        // ---- Open-redirect guard ----
        //
        // Pages that want to be routed to a specific destination after
        // OAuth (e.g. /developers/signup.html sets raku_post_auth_redirect
        // to /developers/register.html) can stash a path in sessionStorage.
        // We treat that value as UNTRUSTED — an attacker who can write to
        // sessionStorage (XSS in another page on the same origin, or a
        // crafted link that runs JS) should not be able to bounce a freshly
        // signed-in user to an external phishing host.
        //
        // Accept only:
        //   - starts with "/"
        //   - second char is NOT "/" or "\\" (rejects "//evil.com" and
        //     "/\\evil.com" protocol-relative tricks)
        //   - resolves to the same origin via URL()
        // Returns a sanitized "/path?query#hash" or null.
        function safeReturnPath(raw) {
            if (!raw || raw.charAt(0) !== '/' || raw.charAt(1) === '/' || raw.charAt(1) === '\\') return null;
            try {
                var resolved = new URL(raw, window.location.origin);
                if (resolved.origin === window.location.origin) {
                    return resolved.pathname + resolved.search + resolved.hash;
                }
            } catch (_) {}
            return null;
        }

        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var error = params.get('error');

        if (error || !code) {
            showError(error || 'No authorization code received');
            return;
        }

        // Exchange authorization code via backend
        var redirectUri = window.location.origin + '/auth/google/callback.html';

        RakuAPI.googleCodeExchange(code, redirectUri)
            .then(function(data) {
                document.getElementById('heading').textContent = 'Welcome!';
                document.getElementById('status').textContent = 'Redirecting...';

                // Priority 1: explicit post-auth redirect (e.g. developer
                // signup wanting to land on /developers/register.html).
                // Validated to same-origin to prevent open redirect.
                var postAuthRaw = sessionStorage.getItem('raku_post_auth_redirect');
                if (postAuthRaw) {
                    sessionStorage.removeItem('raku_post_auth_redirect');
                    var postAuthSafe = safeReturnPath(postAuthRaw);
                    if (postAuthSafe) {
                        window.location.href = postAuthSafe;
                        return;
                    }
                }

                // Priority 2: pending consumer-modal prompt — resume game
                // generation on the homepage.
                var pendingPrompt = sessionStorage.getItem('raku_pending_prompt');
                if (pendingPrompt) {
                    sessionStorage.removeItem('raku_pending_prompt');
                    window.location.href = '/?prompt=' + encodeURIComponent(pendingPrompt);
                } else {
                    window.location.href = '/';
                }
            })
            .catch(function(err) {
                showError(err.message || 'Authentication failed');
            });

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('heading').textContent = 'Sign-in Failed';
            document.getElementById('status').style.display = 'none';
            var errorEl = document.getElementById('error');
            errorEl.style.display = 'block';
            errorEl.textContent = msg + '. ';
            var link = document.createElement('a');
            link.href = '/';
            link.textContent = 'Return to RakuAI';
            errorEl.appendChild(link);
        }
    })();
    </script>
</body>
</html>

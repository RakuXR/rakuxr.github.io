<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Chomper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
    height: 100%;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 10px;
    box-sizing: border-box;
  }
  h1 {
    color: #ffff00;
    font-size: 20px;
    letter-spacing: 2px;
    margin: 6px 0 10px;
    text-shadow: 2px 2px 0 #ff8800;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 560px;
    max-width: 95vw;
    font-size: 10px;
    color: #fff;
    margin-bottom: 6px;
  }
  #hud span { color: #ffff00; }
  canvas {
    background: #000;
    image-rendering: pixelated;
    display: block;
    border: 2px solid #1d2ea8;
    box-shadow: 0 0 20px rgba(29, 46, 168, 0.7);
    max-width: 95vw;
    height: auto;
  }
  #footer {
    margin-top: 8px;
    font-size: 8px;
    color: #888;
    text-align: center;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    text-align: center;
    padding: 16px;
  }
  #overlay.hidden { display: none; }
  #overlay h2 {
    color: #ffff00;
    font-size: 24px;
    text-shadow: 3px 3px 0 #ff0000;
    margin: 0 0 20px;
  }
  #overlay p {
    color: #fff;
    font-size: 10px;
    line-height: 1.8;
    max-width: 520px;
  }
  #overlay .hint {
    color: #00ffff;
    font-size: 10px;
    margin-top: 16px;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>DOT CHOMPER</h1>
  <div id="hud">
    <div>SCORE <span id="score">0</span></div>
    <div>HI <span id="hi">0</span></div>
    <div>LEVEL <span id="level">1</span></div>
    <div>LIVES <span id="lives">3</span></div>
  </div>
  <canvas id="game" width="560" height="620"></canvas>
  <div id="footer">Arrows / WASD / Gamepad &bull; P = Pause &bull; M = Mute</div>
</div>
<div id="overlay">
  <h2>DOT CHOMPER</h2>
  <p>
    Chomp every dot in the maze!<br>
    Power pellets make ghosts vulnerable.<br>
    Grab fruit for bonus points.<br>
    Avoid the ghosts or lose a life.
  </p>
  <p class="hint">PRESS ANY KEY TO START</p>
</div>
<script>
'use strict';

// ============================================================
// DOT CHOMPER - A Pac-Man-style maze game
// ============================================================

const TILE = 20;
const COLS = 28;
const ROWS = 31;
const W = COLS * TILE;      // 560
const H = ROWS * TILE + 40; // 620 (40 px HUD strip at top)
const HUD_H = 40;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ------------------------------------------------------------
// Maze definitions
// Legend:
//  # = wall
//  . = dot
//  o = power pellet
//  ' ' (space) = empty corridor
//  - = ghost house door
// ------------------------------------------------------------

const MAZE_1 = [
  "############################",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#o####.#####.##.#####.####o#",
  "#.####.#####.##.#####.####.#",
  "#..........................#",
  "#.####.##.########.##.####.#",
  "#.####.##.########.##.####.#",
  "#......##....##....##......#",
  "######.##### ## #####.######",
  "######.##### ## #####.######",
  "######.##          ##.######",
  "######.## ######## ##.######",
  "######.## #      # ##.######",
  "      .   #      #   .      ",
  "######.## #      # ##.######",
  "######.## ######## ##.######",
  "######.##          ##.######",
  "######.## ######## ##.######",
  "######.## ######## ##.######",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#.####.#####.##.#####.####.#",
  "#o..##................##..o#",
  "###.##.##.########.##.##.###",
  "###.##.##.########.##.##.###",
  "#......##....##....##......#",
  "#.##########.##.##########.#",
  "#.##########.##.##########.#",
  "#..........................#",
  "############################",
];

const MAZE_2 = [
  "############################",
  "#............##............#",
  "#.##########.##.##########.#",
  "#o##########.##.##########o#",
  "#.##########.##.##########.#",
  "#..........................#",
  "#.####.####.##.####.####.#.#",
  "#.####.####.##.####.####.#.#",
  "#......####........####....#",
  "######.####.####.####.######",
  "######.####.####.####.######",
  "######.     ####     .######",
  "######.####.####.####.######",
  "######.####.####.####.######",
  "      .                .    ",
  "######.####.####.####.######",
  "######.####.####.####.######",
  "######.                ######",
  "######.####.####.####.######",
  "######.####.####.####.######",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#.####.#####.##.#####.####.#",
  "#o..##................##..o#",
  "###.##.##.########.##.##.###",
  "###.##.##.########.##.##.###",
  "#......##....##....##......#",
  "#.##########.##.##########.#",
  "#.##########.##.##########.#",
  "#..........................#",
  "############################",
];

const MAZE_3 = [
  "############################",
  "#.........................##",
  "#.#######.########.#######.#",
  "#o#######.########.#######o#",
  "#.#######.########.#######.#",
  "#..........................#",
  "#.####.###.######.###.####.#",
  "#.####.###.######.###.####.#",
  "#......###........###......#",
  "######.###.######.###.######",
  "######.###.######.###.######",
  "######.###.######.###.######",
  "######.               ######",
  "######.### ######## ###.####",
  "      .### #      # ###.    ",
  "######.### #      # ###.####",
  "######.### ######## ###.####",
  "######.               ######",
  "######.#### ###### ####.####",
  "######.#### ###### ####.####",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#.####.#####.##.#####.####.#",
  "#o..##................##..o#",
  "###.##.##.########.##.##.###",
  "###.##.##.########.##.##.###",
  "#......##....##....##......#",
  "#.##########.##.##########.#",
  "#.##########.##.##########.#",
  "#..........................#",
  "############################",
];

const MAZES = [MAZE_1, MAZE_2, MAZE_3];

// Tile constants for internal grid
const T_WALL = 1;
const T_DOT  = 2;
const T_PWR  = 3;
const T_EMPTY = 0;
const T_DOOR = 4;

let grid = [];
let mazeIndex = 0;
let totalDots = 0;
let dotsEaten = 0;

function loadMaze(idx) {
  const src = MAZES[idx % MAZES.length];
  grid = [];
  totalDots = 0;
  dotsEaten = 0;
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    const line = (src[r] || '').padEnd(COLS, '#');
    for (let c = 0; c < COLS; c++) {
      const ch = line[c];
      switch (ch) {
        case '#': row.push(T_WALL); break;
        case '.': row.push(T_DOT); totalDots++; break;
        case 'o': row.push(T_PWR); totalDots++; break;
        case '-': row.push(T_DOOR); break;
        default:  row.push(T_EMPTY);
      }
    }
    grid.push(row);
  }
}

function tileAt(c, r) {
  if (r < 0 || r >= ROWS) return T_WALL;
  if (c < 0 || c >= COLS) return T_EMPTY;
  return grid[r][c];
}

function isWall(c, r) {
  const t = tileAt(c, r);
  return t === T_WALL || t === T_DOOR;
}

// ------------------------------------------------------------
// Render
// ------------------------------------------------------------

function drawMaze() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, HUD_H, W, H - HUD_H);

  const offY = HUD_H;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = grid[r][c];
      const x = c * TILE;
      const y = r * TILE + offY;
      if (t === T_WALL) {
        ctx.fillStyle = '#1d2ea8';
        ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        ctx.strokeStyle = '#4a5cd8';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
      } else if (t === T_DOOR) {
        ctx.fillStyle = '#ffb8de';
        ctx.fillRect(x, y + TILE / 2 - 2, TILE, 4);
      } else if (t === T_DOT) {
        ctx.fillStyle = '#ffb897';
        ctx.fillRect(x + TILE / 2 - 2, y + TILE / 2 - 2, 4, 4);
      } else if (t === T_PWR) {
        const blink = (Math.floor(performance.now() / 200) % 2) === 0;
        if (blink) {
          ctx.fillStyle = '#ffb897';
          ctx.beginPath();
          ctx.arc(x + TILE / 2, y + TILE / 2, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function drawHUD() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = '#1d2ea8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, HUD_H - 1);
  ctx.lineTo(W, HUD_H - 1);
  ctx.stroke();
}

// ------------------------------------------------------------
// Main loop (rendering only for now)
// ------------------------------------------------------------

loadMaze(0);

function render() {
  drawHUD();
  drawMaze();
}

function frame() {
  render();
  requestAnimationFrame(frame);
}

document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
});
window.addEventListener('keydown', () => {
  document.getElementById('overlay').classList.add('hidden');
}, { once: true });

requestAnimationFrame(frame);
</script>
</body>
</html>

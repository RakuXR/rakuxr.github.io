<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Myriapod Mayhem</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #050607;
      color: #d8f3d0;
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      overflow: hidden;
    }
    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }
    #hud {
      width: min(92vmin, 560px);
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      letter-spacing: 1px;
      text-shadow: 0 0 6px #2e6;
    }
    #hud span b { color: #9f6; }
    canvas {
      display: block;
      width: min(92vmin, 560px);
      height: min(92vmin, 560px);
      background: #05080a;
      border: 1px solid #1a2a1a;
      box-shadow: 0 0 40px rgba(60, 200, 90, 0.15) inset,
                  0 0 30px rgba(60, 200, 90, 0.08);
      image-rendering: pixelated;
      touch-action: none;
    }
    #tip {
      font-size: 11px;
      opacity: 0.7;
      text-align: center;
      max-width: min(92vmin, 560px);
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="hud">
      <span>SCORE <b id="score">0</b></span>
      <span>LV <b id="level">1</b></span>
      <span>LIVES <b id="lives">3</b></span>
    </div>
    <canvas id="game" width="448" height="448"></canvas>
    <div id="tip">Arrows move (bottom zone only) &middot; Space fires &middot; Gamepad supported &middot; M mutes</div>
  </div>

  <script>
  (() => {
    "use strict";

    // -------- Config --------
    const TILE = 14;
    const COLS = 32;
    const ROWS = 32;
    const W = COLS * TILE;
    const H = ROWS * TILE;
    const PLAYER_ZONE_ROWS = 6;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const livesEl = document.getElementById("lives");

    // -------- Input --------
    const keys = new Set();
    window.addEventListener("keydown", (e) => {
      if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","Space"].includes(e.key)) {
        e.preventDefault();
      }
      keys.add(e.key === " " ? "Space" : e.key);
    });
    window.addEventListener("keyup", (e) => {
      keys.delete(e.key === " " ? "Space" : e.key);
    });

    function readGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const pad of pads) {
        if (!pad) continue;
        const ax = pad.axes[0] || 0;
        const ay = pad.axes[1] || 0;
        const dead = 0.25;
        if (ax < -dead || pad.buttons[14]?.pressed) keys.add("ArrowLeft"); else keys.delete("ArrowLeft");
        if (ax >  dead || pad.buttons[15]?.pressed) keys.add("ArrowRight"); else keys.delete("ArrowRight");
        if (ay < -dead || pad.buttons[12]?.pressed) keys.add("ArrowUp"); else keys.delete("ArrowUp");
        if (ay >  dead || pad.buttons[13]?.pressed) keys.add("ArrowDown"); else keys.delete("ArrowDown");
        if (pad.buttons[0]?.pressed || pad.buttons[7]?.pressed) keys.add("Space"); else keys.delete("Space");
        return;
      }
    }

    // -------- Mushroom field --------
    const field = new Int8Array(COLS * ROWS);
    const idx = (c, r) => r * COLS + c;
    const inBounds = (c, r) => c >= 0 && c < COLS && r >= 0 && r < ROWS;
    const getCell = (c, r) => inBounds(c, r) ? field[idx(c, r)] : 0;
    const setCell = (c, r, v) => { if (inBounds(c, r)) field[idx(c, r)] = v; };

    function seedMushrooms(count) {
      for (let i = 0; i < field.length; i++) field[i] = 0;
      let placed = 0, tries = 0;
      while (placed < count && tries < count * 10) {
        tries++;
        const c = (Math.random() * COLS) | 0;
        const r = 1 + ((Math.random() * (ROWS - PLAYER_ZONE_ROWS - 3)) | 0);
        if (field[idx(c, r)] === 0) {
          field[idx(c, r)] = 4;
          placed++;
        }
      }
    }

    function drawMushroom(c, r, stage) {
      const x = c * TILE, y = r * TILE;
      const poisoned = stage < 0;
      const s = poisoned ? -stage : stage;
      ctx.fillStyle = poisoned ? "#3a1a4f" : "#173c1a";
      ctx.fillRect(x + 5, y + 8, 4, 5);
      ctx.fillStyle = poisoned ? "#8a4bd8" : "#4cd657";
      if (s >= 4) {
        ctx.fillRect(x + 2, y + 4, 10, 5);
        ctx.fillRect(x + 3, y + 3, 8, 1);
        ctx.fillRect(x + 4, y + 9, 6, 1);
      } else if (s === 3) {
        ctx.fillRect(x + 3, y + 4, 8, 4);
        ctx.fillRect(x + 4, y + 3, 6, 1);
      } else if (s === 2) {
        ctx.fillRect(x + 4, y + 4, 6, 3);
        ctx.fillRect(x + 5, y + 3, 4, 1);
      } else if (s === 1) {
        ctx.fillRect(x + 5, y + 5, 4, 2);
      }
      if (!poisoned && s >= 2) {
        ctx.fillStyle = "#0e7a1a";
        ctx.fillRect(x + 4, y + 5, 1, 1);
        ctx.fillRect(x + 8, y + 6, 1, 1);
      }
    }

    function drawField() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const v = field[idx(c, r)];
          if (v !== 0) drawMushroom(c, r, v);
        }
      }
    }

    // -------- Player --------
    const player = {
      x: W / 2 - TILE / 2,
      y: H - TILE * 2,
      w: TILE,
      h: TILE,
      speed: 2.2,
      cooldown: 0,
      alive: true,
      invuln: 0,
    };

    function resetPlayer() {
      player.x = W / 2 - TILE / 2;
      player.y = H - TILE * 2;
      player.cooldown = 0;
      player.alive = true;
      player.invuln = 1500;
    }

    function clampPlayerZone() {
      const minY = H - PLAYER_ZONE_ROWS * TILE;
      const maxY = H - TILE;
      if (player.x < 0) player.x = 0;
      if (player.x > W - player.w) player.x = W - player.w;
      if (player.y < minY) player.y = minY;
      if (player.y > maxY) player.y = maxY;
    }

    function playerCellBlocked(px, py) {
      const c = ((px + TILE / 2) / TILE) | 0;
      const r = ((py + TILE / 2) / TILE) | 0;
      return getCell(c, r) > 0;
    }

    function updatePlayer(dt) {
      if (!player.alive) return;
      if (player.invuln > 0) player.invuln -= dt;
      let dx = 0, dy = 0;
      if (keys.has("ArrowLeft"))  dx -= 1;
      if (keys.has("ArrowRight")) dx += 1;
      if (keys.has("ArrowUp"))    dy -= 1;
      if (keys.has("ArrowDown"))  dy += 1;
      if (dx && dy) { dx *= 0.7071; dy *= 0.7071; }

      const nx = player.x + dx * player.speed;
      const ny = player.y + dy * player.speed;
      if (!playerCellBlocked(nx, player.y)) player.x = nx;
      if (!playerCellBlocked(player.x, ny)) player.y = ny;
      clampPlayerZone();

      player.cooldown -= dt;
      if (keys.has("Space") && player.cooldown <= 0 && bullets.length < 2) {
        bullets.push({ x: player.x + player.w / 2 - 1, y: player.y - 4, vy: -6 });
        player.cooldown = 180;
        sfx("shoot");
      }
    }

    function drawPlayer() {
      if (!player.alive) return;
      if (player.invuln > 0 && ((player.invuln / 80) | 0) % 2 === 0) return;
      const x = player.x, y = player.y;
      ctx.fillStyle = "#d6ffd0";
      ctx.fillRect(x + 5, y + 2, 4, 8);
      ctx.fillRect(x + 3, y + 5, 8, 6);
      ctx.fillRect(x + 1, y + 8, 12, 4);
      ctx.fillStyle = "#5dff7a";
      ctx.fillRect(x + 6, y + 5, 2, 3);
      ctx.fillStyle = "#ffb347";
      ctx.fillRect(x + 5, y + 12, 1, 2);
      ctx.fillRect(x + 8, y + 12, 1, 2);
    }

    // -------- Bullets --------
    const bullets = [];
    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y += b.vy;
        if (b.y < -4) { bullets.splice(i, 1); continue; }
        // Centipede segment collision
        let hit = false;
        for (let j = segments.length - 1; j >= 0; j--) {
          const s = segments[j];
          if (!s.alive) continue;
          if (b.x + 2 > s.x + 2 && b.x < s.x + TILE - 2 &&
              b.y + 4 > s.y + 2 && b.y < s.y + TILE - 2) {
            killSegment(j);
            hit = true;
            break;
          }
        }
        if (hit) { bullets.splice(i, 1); continue; }

        const c = ((b.x + 1) / TILE) | 0;
        const r = ((b.y + 2) / TILE) | 0;
        const v = getCell(c, r);
        if (v !== 0) {
          if (v > 0) {
            setCell(c, r, v - 1);
            if (v - 1 === 0) addScore(1);
          } else {
            setCell(c, r, 0);
            addScore(5);
          }
          sfx("hit");
          bullets.splice(i, 1);
          continue;
        }
      }
    }
    function drawBullets() {
      ctx.fillStyle = "#ffffa0";
      for (const b of bullets) ctx.fillRect(b.x, b.y, 2, 4);
    }

    // -------- Centipede --------
    // Each segment is a grid walker. Behavior: move left/right along current row;
    // when blocked (wall or mushroom), drop one row and reverse. If it reaches the
    // bottom (player zone), it pops back up to the top of the player zone.
    // The centipede is stored as a linked list via `next` indices: segments[i].next is index of trailing segment.
    // Head is flagged with isHead. Shooting any segment splits the chain: the hit segment dies, and the segment
    // immediately trailing becomes a new head.
    const segments = [];
    function spawnCentipede(lengthN, startY) {
      for (let i = 0; i < lengthN; i++) {
        segments.push({
          alive: true,
          isHead: i === 0,
          x: (COLS - 1 - i) * TILE,  // spawn off the right, facing left
          y: startY,
          dir: -1,          // -1 left, +1 right
          vdir: 1,          // +1 descending, -1 ascending (used in player zone)
          moveAccum: 0,
          dropping: false,
          dropPx: 0,
          targetRow: startY / TILE,
          next: i + 1 < lengthN ? (segments.length + 1) : -1, // index in global segments array
          wiggle: i,
        });
      }
    }
    function killSegment(j) {
      const seg = segments[j];
      if (!seg || !seg.alive) return;
      seg.alive = false;
      addScore(seg.isHead ? 100 : 10);
      // Leave a mushroom where it died (grid-snapped)
      const c = ((seg.x + TILE / 2) / TILE) | 0;
      const r = ((seg.y + TILE / 2) / TILE) | 0;
      if (getCell(c, r) === 0) setCell(c, r, 4);
      // Split: the segment that had this one as its successor loses it;
      // the segment AFTER this one (seg.next) becomes a new head.
      if (seg.next >= 0 && segments[seg.next] && segments[seg.next].alive) {
        segments[seg.next].isHead = true;
      }
      // The segment that was pointing at j should now point at -1 (end of its chain).
      for (const other of segments) {
        if (other.alive && other.next === j) other.next = -1;
      }
    }

    // Step speed scales with level
    let stepInterval = 110; // ms per grid cell

    function updateCentipede(dt) {
      for (let i = 0; i < segments.length; i++) {
        const s = segments[i];
        if (!s.alive) continue;
        s.moveAccum += dt;
        const interval = stepInterval;
        while (s.moveAccum >= interval) {
          s.moveAccum -= interval;
          stepSegment(s);
        }
      }
    }

    function stepSegment(s) {
      if (s.dropping) {
        // Finish vertical drop of one tile
        s.y += TILE;
        s.dropping = false;
        s.dir = -s.dir;
        // If we just entered the player zone, crawl back up when hitting bottom
        const row = (s.y / TILE) | 0;
        if (row >= ROWS - 1) {
          s.vdir = -1;
        } else if (row <= ROWS - PLAYER_ZONE_ROWS) {
          s.vdir = 1;
        }
        return;
      }
      const nextX = s.x + s.dir * TILE;
      const nextC = (nextX / TILE) | 0;
      const r = (s.y / TILE) | 0;
      const hitWall = nextX < 0 || nextX > W - TILE;
      const hitMush = !hitWall && getCell(nextC, r) > 0;
      if (hitWall || hitMush) {
        // Drop (or rise if in player zone vdir = -1)
        const newRow = r + s.vdir;
        if (newRow < 0) { s.vdir = 1; s.y += TILE; s.dir = -s.dir; return; }
        if (newRow >= ROWS) { s.vdir = -1; s.y -= TILE; s.dir = -s.dir; return; }
        s.dropping = true;
        return;
      }
      s.x = nextX;
      s.wiggle++;
      // Eat poisoned? Triggers a dive (commit 3 introduces poisoned cells; safe no-op here)
      const v = getCell((s.x / TILE) | 0, r);
      if (v < 0 && s.isHead) {
        // Rage-dive straight down towards the player zone
        s.vdir = 1;
        s.dropping = true;
      }
    }

    function drawCentipede() {
      for (let i = 0; i < segments.length; i++) {
        const s = segments[i];
        if (!s.alive) continue;
        const hue = (i * 18) % 60;
        const body = s.isHead ? "#ff3e7a" : `hsl(${120 + hue},80%,55%)`;
        ctx.fillStyle = body;
        ctx.fillRect(s.x + 2, s.y + 2, TILE - 4, TILE - 4);
        // Eyes / spikes
        ctx.fillStyle = s.isHead ? "#fff" : "#0a2a10";
        if (s.isHead) {
          ctx.fillRect(s.x + 4, s.y + 4, 2, 2);
          ctx.fillRect(s.x + 8, s.y + 4, 2, 2);
        } else {
          // Legs wiggle
          const w = (s.wiggle & 1);
          ctx.fillRect(s.x + 1, s.y + 4 + w, 1, 2);
          ctx.fillRect(s.x + TILE - 2, s.y + 4 + (1 - w), 1, 2);
          ctx.fillRect(s.x + 1, s.y + 9 + (1 - w), 1, 2);
          ctx.fillRect(s.x + TILE - 2, s.y + 9 + w, 1, 2);
        }
      }
    }

    function centipedeAlive() {
      return segments.some(s => s.alive);
    }

    function checkPlayerCentipedeHit() {
      if (!player.alive || player.invuln > 0) return;
      for (const s of segments) {
        if (!s.alive) continue;
        if (player.x + 3 < s.x + TILE - 3 && player.x + player.w - 3 > s.x + 3 &&
            player.y + 3 < s.y + TILE - 3 && player.y + player.h - 3 > s.y + 3) {
          killPlayer();
          return;
        }
      }
    }

    function killPlayer() {
      player.alive = false;
      lives--;
      updateHUD();
      sfx("die");
      setTimeout(() => {
        if (lives <= 0) {
          // Game over -> restart
          score = 0; lives = 3; level = 1;
          stepInterval = 110;
          seedMushrooms(40);
          segments.length = 0;
          spawnCentipede(10, TILE);
          updateHUD();
        } else {
          segments.length = segments.filter(s => s.alive).length
            ? segments.length
            : (spawnCentipede(10, TILE), segments.length);
        }
        resetPlayer();
      }, 700);
    }

    // -------- Scoring & HUD --------
    let score = 0;
    let lives = 3;
    let level = 1;
    function addScore(n) {
      score += n;
      scoreEl.textContent = score;
    }
    function updateHUD() {
      scoreEl.textContent = score;
      levelEl.textContent = level;
      livesEl.textContent = lives;
    }

    // -------- Audio stub (Web Audio API added in later commit) --------
    function sfx(_name) { /* filled in later commit */ }

    // -------- Main loop --------
    let last = performance.now();
    function frame(now) {
      const dt = Math.min(50, now - last);
      last = now;
      readGamepad();
      updatePlayer(dt);
      updateBullets();
      updateCentipede(dt);
      checkPlayerCentipedeHit();

      if (!centipedeAlive()) {
        level++;
        stepInterval = Math.max(50, 110 - level * 8);
        seedMushrooms(40 + level * 4);
        spawnCentipede(10, TILE);
        updateHUD();
      }

      ctx.fillStyle = "#05080a";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "rgba(30, 80, 40, 0.08)";
      ctx.fillRect(0, H - PLAYER_ZONE_ROWS * TILE, W, PLAYER_ZONE_ROWS * TILE);
      drawField();
      drawCentipede();
      drawBullets();
      drawPlayer();
      requestAnimationFrame(frame);
    }

    // -------- Init --------
    seedMushrooms(40);
    spawnCentipede(10, TILE);
    updateHUD();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>

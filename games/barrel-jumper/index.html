<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Barrel Jumper</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: "Courier New", monospace;
    height: 100%;
    overflow: hidden;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 12px;
    box-sizing: border-box;
  }
  h1 {
    margin: 0 0 8px 0;
    font-size: 20px;
    letter-spacing: 3px;
    color: #ffd24a;
    text-shadow: 2px 2px 0 #8b0000;
  }
  #game {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border: 3px solid #444;
    box-shadow: 0 0 28px rgba(255, 64, 0, 0.25);
    max-width: 100%;
    height: auto;
  }
  .hint {
    margin-top: 8px;
    font-size: 11px;
    color: #888;
    text-align: center;
    letter-spacing: 1px;
  }
  .hint b { color: #ffd24a; }
</style>
</head>
<body>
<div id="wrap">
  <h1>BARREL JUMPER</h1>
  <canvas id="game" width="448" height="512"></canvas>
  <div class="hint">
    <b>ARROWS</b> move / climb &nbsp;|&nbsp; <b>SPACE</b> jump &nbsp;|&nbsp; <b>P</b> pause &nbsp;|&nbsp; gamepad supported
  </div>
</div>
<script>
"use strict";
(function () {
  // ---------- constants ----------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;
  const TILE = 16;
  const COLS = W / TILE; // 28
  const ROWS = H / TILE; // 32

  // colors
  const COL_BG = "#000";
  const COL_GIRDER = "#ff3a1d";
  const COL_GIRDER_HL = "#ff7a5c";
  const COL_RIVET = "#ffd24a";
  const COL_LADDER = "#4aa8ff";
  const COL_LADDER_RUNG = "#cfe8ff";
  const COL_TEXT = "#fff";

  // ---------- level tile map ----------
  // Legend for tile map strings:
  //   '.' empty
  //   '=' girder (solid top)
  //   'H' ladder
  //   'h' broken ladder (cannot climb past)
  //   'r' rivet  (stage 4)
  //   'c' conveyor (stage 2)
  //   'o' oil drum / fire source
  //   'P' princess spawn
  //   'G' gorilla spawn
  //   'M' hero spawn
  //   '*' hammer
  //   'L' elevator column (stage 3)

  // Stage 1: classic barrels - stacked girders
  // 28 cols x 32 rows
  const STAGE1 = [
    "............P...............",
    "=============H==============",
    ".............H..............",
    ".............H........G.....",
    "=============================",
    "H...........................",
    "H...........*...............",
    "H...........................",
    "=============================",
    "...........................H",
    "...........................H",
    "...........................H",
    "=============================",
    "H...........................",
    "H...........................",
    "H...........................",
    "=============================",
    "...........................H",
    "...........................H",
    "...........................H",
    "=============================",
    "H...........................",
    "H...........................",
    "H...........................",
    "=============================",
    "............................",
    "............................",
    "....M.......................",
    "============================",
    "...o........................",
    "............................",
    "............................"
  ];

  // Stage 2: conveyor belts + cement pies
  const STAGE2 = [
    "............P...............",
    "=============H==============",
    ".............H..............",
    ".............H........G.....",
    "=============================",
    "H...........................",
    "H...........*...............",
    "H...........................",
    "cccccccccccccccccccccccccccc",
    "...........................H",
    "...........................H",
    "...........................H",
    "cccccccccccccccccccccccccccc",
    "H...........................",
    "H...........................",
    "H...........................",
    "cccccccccccccccccccccccccccc",
    "...........................H",
    "...........................H",
    "...........................H",
    "cccccccccccccccccccccccccccc",
    "H...........................",
    "H...........................",
    "H...........................",
    "=============================",
    "............................",
    "............................",
    "....M.......................",
    "============================",
    "...o........................",
    "............................",
    "............................"
  ];

  // Stage 3: elevators
  const STAGE3 = [
    "............P...............",
    "=============H==============",
    ".............H..............",
    ".............H........G.....",
    "=============================",
    "H........L.........L........",
    "H........L.........L........",
    "H........L....*....L........",
    "======...L.........L...=====",
    ".........L.........L.......H",
    ".........L.........L.......H",
    ".........L.........L.......H",
    "======...L.........L...=====",
    "H........L.........L........",
    "H........L.........L........",
    "H........L.........L........",
    "======...L.........L...=====",
    ".........L.........L.......H",
    ".........L.........L.......H",
    ".........L.........L.......H",
    "======...L.........L...=====",
    "H........L.........L........",
    "H........L.........L........",
    "H........L.........L........",
    "=============================",
    "............................",
    "............................",
    "....M.......................",
    "============================",
    "...o........................",
    "............................",
    "............................"
  ];

  // Stage 4: rivets
  const STAGE4 = [
    "............P...............",
    "r===========H==============r",
    ".............H..............",
    ".............H........G.....",
    "r===========================r",
    "H....*......................",
    "H...........................",
    "H...........................",
    "r===========================r",
    "...........................H",
    "...........................H",
    "...........................H",
    "r===========================r",
    "H...........................",
    "H...........................",
    "H...........................",
    "r===========================r",
    "...........................H",
    "...........................H",
    "...........................H",
    "r===========================r",
    "H...........................",
    "H...........................",
    "H...........................",
    "r===========================r",
    "............................",
    "............................",
    "....M.......................",
    "r==========================r",
    "...o........................",
    "............................",
    "............................"
  ];

  const STAGES = [STAGE1, STAGE2, STAGE3, STAGE4];

  // ---------- level parsing ----------
  function makeLevel(rawRows) {
    // pad rows to ROWS count
    const rows = rawRows.slice();
    while (rows.length < ROWS) rows.push(".".repeat(COLS));
    const map = [];
    const spawns = { hero: null, gorilla: null, princess: null, oil: null };
    const hammers = [];
    const rivets = [];
    for (let y = 0; y < ROWS; y++) {
      const line = (rows[y] || "").padEnd(COLS, ".");
      const row = [];
      for (let x = 0; x < COLS; x++) {
        const ch = line[x];
        let t = ".";
        if (ch === "=" || ch === "c") t = ch;
        else if (ch === "H" || ch === "h") t = ch;
        else if (ch === "L") t = "L";
        else if (ch === "r") {
          t = "=";
          rivets.push({ x: x * TILE, y: y * TILE, alive: true });
        } else if (ch === "M") spawns.hero = { x: x * TILE, y: y * TILE };
        else if (ch === "G") spawns.gorilla = { x: x * TILE, y: y * TILE };
        else if (ch === "P") spawns.princess = { x: x * TILE, y: y * TILE };
        else if (ch === "o") spawns.oil = { x: x * TILE, y: y * TILE };
        else if (ch === "*") hammers.push({ x: x * TILE, y: y * TILE, alive: true });
        row.push(t);
      }
      map.push(row);
    }
    return { map, spawns, hammers, rivets };
  }

  function tileAt(level, tx, ty) {
    if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return ".";
    return level.map[ty][tx];
  }
  function isSolidTop(t) { return t === "=" || t === "c"; }
  function isLadder(t) { return t === "H" || t === "h"; }
  function isElev(t) { return t === "L"; }

  // test if point (px,py) is directly supported by a girder tile top edge
  function pointOnGround(level, px, py) {
    const tx = Math.floor(px / TILE);
    const ty = Math.floor(py / TILE);
    const t = tileAt(level, tx, ty);
    if (!isSolidTop(t)) return false;
    return Math.abs(py - ty * TILE) < 2;
  }

  // ---------- rendering ----------
  function drawGirder(x, y) {
    ctx.fillStyle = COL_GIRDER;
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = COL_GIRDER_HL;
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillStyle = "#8b0000";
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
    ctx.fillStyle = COL_RIVET;
    ctx.fillRect(x + 2, y + 6, 2, 2);
    ctx.fillRect(x + TILE - 4, y + 6, 2, 2);
  }
  function drawConveyor(x, y, phase) {
    ctx.fillStyle = "#3a3a3a";
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = "#888";
    ctx.fillRect(x, y, TILE, 2);
    ctx.fillStyle = "#bbb";
    const p = Math.floor(phase) % 4;
    for (let i = -p; i < TILE; i += 4) {
      if (i + 2 <= TILE && i >= 0) ctx.fillRect(x + i, y + 4, 2, 2);
    }
    ctx.fillStyle = "#222";
    ctx.fillRect(x, y + TILE - 2, TILE, 2);
  }
  function drawLadder(x, y) {
    ctx.fillStyle = COL_LADDER;
    ctx.fillRect(x + 3, y, 2, TILE);
    ctx.fillRect(x + TILE - 5, y, 2, TILE);
    ctx.fillStyle = COL_LADDER_RUNG;
    ctx.fillRect(x + 3, y + 4, TILE - 8, 2);
    ctx.fillRect(x + 3, y + 11, TILE - 8, 2);
  }
  function drawElevator(x, y) {
    ctx.fillStyle = "#222";
    ctx.fillRect(x + 6, y, 4, TILE);
    ctx.fillStyle = "#555";
    ctx.fillRect(x + 5, y, 1, TILE);
    ctx.fillRect(x + 10, y, 1, TILE);
  }

  function drawLevel(level, t) {
    ctx.fillStyle = COL_BG;
    ctx.fillRect(0, 0, W, H);
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const tile = level.map[y][x];
        const px = x * TILE;
        const py = y * TILE;
        if (tile === "=") drawGirder(px, py);
        else if (tile === "c") drawConveyor(px, py, t * 0.1);
        else if (tile === "H" || tile === "h") drawLadder(px, py);
        else if (tile === "L") drawElevator(px, py);
      }
    }
  }

  // ---------- HUD ----------
  function drawHUD(state) {
    ctx.fillStyle = COL_TEXT;
    ctx.font = "10px 'Courier New', monospace";
    ctx.textAlign = "left";
    ctx.fillText("SCORE", 8, 12);
    ctx.fillText(String(state.score).padStart(6, "0"), 8, 24);
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd24a";
    ctx.fillText("STAGE " + (state.stage + 1), W / 2, 12);
    ctx.fillStyle = "#9fe";
    ctx.fillText(["25M", "50M", "75M", "100M"][state.stage], W / 2, 24);
    ctx.textAlign = "right";
    ctx.fillStyle = COL_TEXT;
    ctx.fillText("LIVES " + state.lives, W - 8, 12);
    ctx.fillText("BONUS " + state.bonus, W - 8, 24);
  }

  // ---------- state skeleton (fleshed out later) ----------
  const state = {
    stage: 0,
    level: null,
    score: 0,
    lives: 3,
    bonus: 5000,
    paused: false,
    tick: 0
  };

  function loadStage(i) {
    state.stage = i;
    state.level = makeLevel(STAGES[i]);
    state.bonus = 5000;
    state.tick = 0;
  }

  function frame() {
    state.tick++;
    drawLevel(state.level, state.tick);
    drawHUD(state);
    requestAnimationFrame(frame);
  }

  loadStage(0);
  frame();

  // expose for later stages of development
  window.BJ = { state, loadStage, makeLevel, STAGES };
})();
</script>
</body>
</html>

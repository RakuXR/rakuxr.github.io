# Fail the build if the hosted capture-app/ has drifted from its canonical
# source in raku-runtime/web/capture/.
#
# capture-app/ is a GENERATED mirror: canonical web/capture/ verbatim, plus the
# deterministic hosting adaptations in scripts/capture-app-adaptations.py, plus
# two preserved mirror-only files (README.md, qr-capture-app.svg).
# scripts/verify-capture-app.sh regenerates that and diffs it against what is
# committed; any difference fails this job. So the mirror cannot silently
# diverge from canonical - drift becomes a red check on the PR.
name: Verify capture-app sync

on:
  push:
    branches: [main]
    paths:
      - 'capture-app/**'
      - 'scripts/sync-capture-app.sh'
      - 'scripts/verify-capture-app.sh'
      - 'scripts/capture-app-adaptations.py'
      - '.github/workflows/verify-capture-app-sync.yml'
  pull_request:
    paths:
      - 'capture-app/**'
      - 'scripts/sync-capture-app.sh'
      - 'scripts/verify-capture-app.sh'
      - 'scripts/capture-app-adaptations.py'
      - '.github/workflows/verify-capture-app-sync.yml'
  # Manual trigger - useful to catch canonical-side changes that landed in
  # raku-runtime without a corresponding sync commit here.
  workflow_dispatch:

jobs:
  verify-capture-app-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rakuxr.github.io
        uses: actions/checkout@v4

      # raku-runtime is PRIVATE, so the default GITHUB_TOKEN (scoped to this
      # repo) cannot fetch it. A repo secret named RAKU_RUNTIME_READ_TOKEN must
      # hold a fine-grained PAT (or GitHub App installation token) with
      # 'Contents: Read' on RakuXR/raku-runtime. If the secret is absent or
      # empty, the workflow exits with a CLEAR error rather than silently
      # green-stamping. See docs/ci/verify-capture-app-sync-setup.md.
      - name: Check that the cross-repo token secret is set
        env:
          TOKEN: ${{ secrets.RAKU_RUNTIME_READ_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::secrets.RAKU_RUNTIME_READ_TOKEN is not set."
            echo "::error::This workflow needs cross-repo read on the private RakuXR/raku-runtime."
            echo "::error::See docs/ci/verify-capture-app-sync-setup.md for the one-time setup."
            exit 1
          fi
          echo "RAKU_RUNTIME_READ_TOKEN is configured (length=${#TOKEN})."

      - name: Checkout canonical raku-runtime (capture app only)
        uses: actions/checkout@v4
        with:
          repository: RakuXR/raku-runtime
          ref: main
          token: ${{ secrets.RAKU_RUNTIME_READ_TOKEN }}
          path: _canonical-raku-runtime
          sparse-checkout: web/capture
          sparse-checkout-cone-mode: false

      - name: Verify capture-app/ matches canonical
        run: |
          sh scripts/verify-capture-app.sh "$GITHUB_WORKSPACE/_canonical-raku-runtime"

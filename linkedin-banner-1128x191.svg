<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a388ff"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="1128" height="191" fill="#0a0a1a"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1128" y2="191" stroke="#a388ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="1328" y2="191" stroke="#a388ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1528" y2="191" stroke="#a388ff" stroke-width="0.5"/>
    <line x1="-200" y1="0" x2="928" y2="191" stroke="#00cec9" stroke-width="0.5"/>
    <line x1="-400" y1="0" x2="728" y2="191" stroke="#00cec9" stroke-width="0.5"/>
  </g>

  <!-- Accent line at bottom -->
  <rect x="0" y="187" width="1128" height="4" fill="url(#g2)"/>

  <!-- Left: Kanji logo -->
  <text x="80" y="125" text-anchor="middle" font-family="'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif" font-size="90" font-weight="700" fill="url(#g)">楽</text>
  <text x="140" y="125" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="48" font-weight="800" fill="url(#g)">AI</text>

  <!-- Divider -->
  <line x1="195" y1="40" x2="195" y2="155" stroke="#333355" stroke-width="1"/>

  <!-- Center: RAKUAI text -->
  <text x="225" y="105" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="52" font-weight="800" letter-spacing="0.06em" fill="url(#g)">RAKUAI</text>
  <text x="225" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="16" font-weight="500" fill="#9090b0" letter-spacing="0.2em">AI-NATIVE GAME ENGINE</text>

  <!-- Right: Japanese tagline -->
  <text x="908" y="80" text-anchor="end" font-family="'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif" font-size="18" font-weight="500" fill="#9090b0">ゲームを語る。すぐに遊べる。</text>
  <text x="908" y="115" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="14" fill="#666688">Describe any game. Play it instantly.</text>
  <text x="908" y="145" text-anchor="end" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" fill="#555577">rakuai.com · 5 Patents · 2,718 APIs · XR-Ready</text>

  <!-- Right edge: GDC badge -->
  <rect x="940" y="50" width="160" height="90" rx="8" fill="#111128" stroke="#333355" stroke-width="1"/>
  <text x="1020" y="82" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#00cec9">GDC 2026</text>
  <text x="1020" y="102" text-anchor="middle" font-family="'Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif" font-size="11" fill="#9090b0">サンフランシスコ</text>
  <text x="1020" y="120" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" fill="#9090b0">San Francisco</text>
  <text x="1020" y="135" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="10" fill="#555577">March 9-13</text>
</svg>
